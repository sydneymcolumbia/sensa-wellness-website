<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sensa — Your Health, Decoded: CRP (1080x1080)</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,700;0,800;0,900;1,700;1,800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #444;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px;
    font-family: 'Poppins', Arial Rounded MT Bold, sans-serif;
  }

  .canvas {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
  }

  /* ---- Bubble border via SVG background ---- */
  .bubble-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* ---- White card ---- */
  .card {
    position: absolute;
    top: 72px;
    left: 72px;
    right: 72px;
    bottom: 72px;
    background: #fffff7;
    border-radius: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 64px;
    overflow: hidden;
  }

  /* Card watermark */
  .card-watermark {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    width: 100%;
  }

  .eyebrow {
    font-size: 22px;
    font-weight: 700;
    color: #7267f2;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 38px;
  }

  .headline {
    font-size: 82px;
    font-weight: 900;
    color: #1800ad;
    text-align: center;
    line-height: 1.05;
    letter-spacing: -1px;
  }

  .divider {
    width: 80%;
    height: 2px;
    background: #7267f2;
    opacity: 0.3;
    margin: 42px auto;
  }

  .body-text {
    font-size: 40px;
    font-weight: 700;
    color: #1800ad;
    text-align: center;
    line-height: 1.3;
  }

  .accent {
    color: #e85a39;
    font-style: italic;
  }

  .divider2 {
    width: 80%;
    height: 2px;
    background: #7267f2;
    opacity: 0.3;
    margin: 42px auto;
  }

  /* Logo row */
  .logo-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 10px;
  }

  .logo-wordmark {
    font-size: 34px;
    font-weight: 800;
    color: #1800ad;
  }

  .url {
    font-size: 20px;
    font-weight: 600;
    color: #7267f2;
    margin-left: 4px;
  }
</style>
</head>
<body>
<div class="canvas">

  <!-- Bubble border as inline SVG -->
  <svg class="bubble-bg" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="bp" x="0" y="0" width="160" height="160" patternUnits="userSpaceOnUse">
        <!-- Row 1 -->
        <circle cx="20" cy="20" r="23" fill="#1800ad"/>
        <circle cx="60" cy="20" r="23" fill="#e85a39"/>
        <circle cx="100" cy="20" r="23" fill="#fac234"/>
        <circle cx="140" cy="20" r="23" fill="#41a6f0"/>
        <!-- Row 2 -->
        <circle cx="20" cy="60" r="23" fill="#7267f2"/>
        <circle cx="60" cy="60" r="23" fill="#fac234"/>
        <circle cx="100" cy="60" r="23" fill="#1800ad"/>
        <circle cx="140" cy="60" r="23" fill="#7267f2"/>
        <!-- Row 3 -->
        <circle cx="20" cy="100" r="23" fill="#e85a39"/>
        <circle cx="60" cy="100" r="23" fill="#41a6f0"/>
        <circle cx="100" cy="100" r="23" fill="#7267f2"/>
        <circle cx="140" cy="100" r="23" fill="#fac234"/>
        <!-- Row 4 -->
        <circle cx="20" cy="140" r="23" fill="#fac234"/>
        <circle cx="60" cy="140" r="23" fill="#1800ad"/>
        <circle cx="100" cy="140" r="23" fill="#e85a39"/>
        <circle cx="140" cy="140" r="23" fill="#41a6f0"/>
      </pattern>
    </defs>
    <!-- Full background with bubble pattern -->
    <rect width="1080" height="1080" fill="url(#bp)"/>
    <!-- Dark navy outline on inner card edge -->
    <rect x="70" y="70" width="940" height="940" rx="30" fill="none" stroke="#1800ad" stroke-width="3" opacity="0.3"/>
  </svg>

  <!-- White card -->
  <div class="card">

    <!-- Card watermark: faint bubble clusters -->
    <svg class="card-watermark" viewBox="0 0 936 936" xmlns="http://www.w3.org/2000/svg" opacity="0.045">
      <circle cx="150" cy="150" r="80" fill="#7267f2"/>
      <circle cx="110" cy="200" r="60" fill="#e85a39"/>
      <circle cx="180" cy="210" r="50" fill="#1800ad"/>
      <circle cx="800" cy="780" r="90" fill="#1800ad"/>
      <circle cx="760" cy="730" r="65" fill="#7267f2"/>
      <circle cx="830" cy="740" r="55" fill="#41a6f0"/>
      <circle cx="500" cy="500" r="110" fill="#7267f2" opacity="0.4"/>
    </svg>

    <div class="content">
      <div class="eyebrow">Your Health, Decoded</div>

      <div class="headline">
        Most people<br>know their<br>cholesterol.
      </div>

      <div class="divider"></div>

      <div class="body-text">
        Almost nobody<br>knows their<br>
        <span class="accent">CRP.</span>
      </div>

      <div class="divider2"></div>

      <div class="body-text" style="font-size:30px; opacity:0.7; font-weight:600;">
        C-Reactive Protein is one of the most<br>
        powerful predictors of chronic disease.
      </div>

      <div class="logo-row" style="margin-top:38px;">
        <!-- Sensa logo mark -->
        <svg width="46" height="50" viewBox="0 0 46 50" fill="none">
          <circle cx="26" cy="11" r="11" fill="#41a6f0"/>
          <circle cx="13" cy="17" r="9" fill="#e85a39"/>
          <circle cx="8" cy="29" r="7" fill="#fac234"/>
          <circle cx="33" cy="25" r="8" fill="#7267f2"/>
          <circle cx="21" cy="29" r="15" fill="#1800ad"/>
          <circle cx="10" cy="40" r="7" fill="#1800ad"/>
          <circle cx="22" cy="44" r="6" fill="#41a6f0"/>
          <circle cx="33" cy="40" r="6" fill="#7267f2"/>
        </svg>
        <span class="logo-wordmark">Sensa</span>
        <span class="url">· sensawellness.org</span>
      </div>
    </div>
  </div>

</div>
</body>
</html>
